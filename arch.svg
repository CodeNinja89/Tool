<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
  </defs>

  <style>
    .box { fill: #f8f9fa; stroke: #343a40; stroke-width: 2px; rx: 8px; ry: 8px; }
    .box-success { fill: #d4edda; stroke: #28a745; stroke-width: 2px; rx: 8px; ry: 8px; }
    .box-danger { fill: #f8d7da; stroke: #dc3545; stroke-width: 2px; rx: 8px; ry: 8px; }
    .box-header { fill: #fdfdfd; stroke: #adb5bd; stroke-width: 1px; rx: 8px; ry: 8px; stroke-dasharray: 6,4; }
    .text { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; fill: #212529; text-anchor: middle; dominant-baseline: middle; }
    .text-bold { font-weight: bold; }
    .text-small { font-size: 12px; fill: #495057; }
    .line { stroke: #495057; stroke-width: 2px; fill: none; }
    .label-bg { fill: white; fill-opacity: 0.9; rx: 4px; ry: 4px;}
  </style>

  <rect x="30" y="20" width="240" height="310" class="box-header" />
  <text x="150" y="40" class="text text-bold" fill="#6c757d">1. Front-End (The Intent)</text>

  <rect x="300" y="100" width="460" height="430" class="box-header" />
  <text x="530" y="125" class="text text-bold" fill="#6c757d">2. Middle-End (Tool Translator / Facade)</text>

  <rect x="180" y="550" width="580" height="180" class="box-header" />
  <text x="470" y="575" class="text text-bold" fill="#6c757d">3. Back-End (Reachability Solver)</text>

  <line x1="150" y1="105" x2="150" y2="155" class="line" marker-end="url(#arrow)" />
  <line x1="150" y1="205" x2="150" y2="255" class="line" marker-end="url(#arrow)" />
  
  <path d="M 240 280 C 350 280, 250 175, 410 175" class="line" marker-end="url(#arrow)" />

  <line x1="530" y1="200" x2="530" y2="250" class="line" marker-end="url(#arrow)" />
  
  <path d="M 530 300 C 530 320, 420 320, 420 350" class="line" marker-end="url(#arrow)" />
  <path d="M 530 300 C 530 320, 640 320, 640 350" class="line" marker-end="url(#arrow)" />

  <path d="M 420 400 C 420 430, 530 430, 530 450" class="line" marker-end="url(#arrow)" />
  <path d="M 640 400 C 640 430, 530 430, 530 450" class="line" marker-end="url(#arrow)" />

  <line x1="530" y1="500" x2="530" y2="600" class="line" marker-end="url(#arrow)" />

  <path d="M 530 650 C 530 670, 350 670, 350 685" class="line" marker-end="url(#arrow)" />
  <path d="M 530 650 C 530 670, 710 670, 710 685" class="line" marker-end="url(#arrow)" />

  <rect x="365" y="315" width="115" height="20" class="label-bg" />
  <text x="420" y="325" class="text text-small">Variable Versioning</text>
  
  <rect x="590" y="315" width="105" height="20" class="label-bg" />
  <text x="640" y="325" class="text text-small">Function Oracles</text>

  <rect x="475" y="525" width="110" height="20" class="label-bg" />
  <text x="530" y="535" class="text text-small">Pre ⇒ Inv ⇒ Post</text>


