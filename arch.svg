  <text x="640" y="383" class="text text-small">Uninterpreted Predicates</text>

  <rect x="420" y="450" width="220" height="50" class="box" />
  <text x="530" y="467" class="text text-bold">CHC Generator</text>
  <text x="530" y="483" class="text text-small">Logic Formula Assembly</text>


  <rect x="420" y="600" width="220" height="50" class="box" />
  <text x="530" y="617" class="text text-bold">Z3 / Spacer</text>
  <text x="530" y="633" class="text text-small">Fixed-Point Engine</text>

  <rect x="270" y="685" width="160" height="50" class="box-success" />
  <text x="350" y="702" class="text text-bold">SAT (Verified)</text>
  <text x="350" y="718" class="text text-small">Theorem Proved</text>

  <rect x="630" y="685" width="160" height="50" class="box-danger" />
  <text x="710" y="702" class="text text-bold">UNSAT (Failed)</text>
  <text x="710" y="718" class="text text-small">Counter-Example Found</text>

</svg>