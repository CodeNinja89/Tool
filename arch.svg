  <text x="150" y="272" class="text text-bold">Concrete Parse Tree</text>
  <text x="150" y="288" class="text text-small">Raw Tokens</text>


  <rect x="420" y="150" width="220" height="50" class="box" />
  <text x="530" y="167" class="text text-bold">AST Constructor</text>
  <text x="530" y="183" class="text text-small">toolAst.py</text>

  <rect x="420" y="250" width="220" height="50" class="box" />
  <text x="530" y="267" class="text text-bold">SSA Transformer</text>
  <text x="530" y="283" class="text text-small">The "Quantifier Killer"</text>

