  <text x="150" y="72" class="text text-bold">User Source Code</text>
  <text x="150" y="88" class="text text-small">.tool file</text>

  <rect x="60" y="155" width="180" height="50" class="box" />
  <text x="150" y="172" class="text text-bold">Lark Parser</text>
  <text x="150" y="188" class="text text-small">LALR Engine</text>

