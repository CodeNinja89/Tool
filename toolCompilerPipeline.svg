<svg viewBox="0 0 800 1150" xmlns="http://www.w3.org/2000/svg" style="background-color: #FFFFFF; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.05" />
    </filter>
  </defs>

  <text x="400" y="50" font-size="28" font-weight="bold" fill="#0f172a" text-anchor="middle">Tool Compiler Architecture</text>
  <text x="400" y="80" font-size="16" fill="#64748b" text-anchor="middle">From Imperative Text to Mathematical Proof</text>

  <rect x="300" y="110" width="200" height="40" rx="20" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
  <text x="400" y="136" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">source.tool (Text)</text>

  <line x1="400" y1="150" x2="400" y2="180" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />

  <rect x="100" y="190" width="600" height="160" rx="12" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="225" font-size="20" font-weight="bold" fill="#0369a1">Phase 1: The Front-End</text>
  <text x="680" y="225" font-size="14" font-style="italic" fill="#0284c7" text-anchor="end">Syntax &amp; Structure</text>
  <line x1="120" y1="240" x2="680" y2="240" stroke="#bae6fd" stroke-width="2" />
  
  <rect x="120" y="260" width="170" height="60" rx="6" fill="#ffffff" stroke="#7dd3fc" stroke-width="1" />
  <text x="205" y="285" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">toolGrammar.lark</text>
  <text x="205" y="305" font-size="12" fill="#475569" text-anchor="middle">Lexer &amp; BNF Rules</text>

  <rect x="315" y="260" width="170" height="60" rx="6" fill="#ffffff" stroke="#7dd3fc" stroke-width="1" />
  <text x="400" y="285" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">toolParser.py</text>
  <text x="400" y="305" font-size="12" fill="#475569" text-anchor="middle">CHCTransformer</text>

  <rect x="510" y="260" width="170" height="60" rx="6" fill="#ffffff" stroke="#7dd3fc" stroke-width="1" />
  <text x="595" y="285" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">toolAst.py</text>
  <text x="595" y="305" font-size="12" fill="#475569" text-anchor="middle">AST Dataclasses</text>

  <line x1="400" y1="350" x2="400" y2="400" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
  <rect x="330" y="365" width="140" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="400" y="382" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">Raw ASTNodes</text>

  <rect x="100" y="410" width="600" height="160" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="445" font-size="20" font-weight="bold" fill="#15803d">Phase 2: Semantic Analysis</text>
  <text x="680" y="445" font-size="14" font-style="italic" fill="#166534" text-anchor="end">Rules &amp; Universe Building</text>
  <line x1="120" y1="460" x2="680" y2="460" stroke="#bbf7d0" stroke-width="2" />

  <rect x="180" y="480" width="200" height="60" rx="6" fill="#ffffff" stroke="#86efac" stroke-width="1" />
  <text x="280" y="505" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">toolTypes.py</text>
  <text x="280" y="525" font-size="12" fill="#475569" text-anchor="middle">TypeEnvironment (Global Scope)</text>

  <rect x="420" y="480" width="200" height="60" rx="6" fill="#ffffff" stroke="#86efac" stroke-width="1" />
  <text x="520" y="505" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">toolTypeChecker.py</text>
  <text x="520" y="525" font-size="12" fill="#475569" text-anchor="middle">Contextual Type Inference</text>

  <line x1="400" y1="570" x2="400" y2="620" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
  <rect x="330" y="585" width="140" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="400" y="602" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">Typed AST</text>

  <rect x="100" y="630" width="600" height="160" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="665" font-size="20" font-weight="bold" fill="#c2410c">Phase 3: The Imperative Bridge</text>
  <text x="680" y="665" font-size="14" font-style="italic" fill="#9a3412" text-anchor="end">Static Single Assignment (SSA)</text>
  <line x1="120" y1="680" x2="680" y2="680" stroke="#fed7aa" stroke-width="2" />

  <rect x="200" y="700" width="400" height="60" rx="6" fill="#ffffff" stroke="#fdba74" stroke-width="1" />
  <text x="400" y="725" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">toolSSA.py (SSATransformer)</text>
  <text x="400" y="745" font-size="12" fill="#475569" text-anchor="middle">Havocing • Phi Nodes • Loop Transition Sandboxing</text>

  <line x1="400" y1="790" x2="400" y2="840" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
  <rect x="310" y="805" width="180" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="400" y="822" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">Versioned Math Formulas</text>

  <rect x="100" y="850" width="600" height="160" rx="12" fill="#faf5ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="885" font-size="20" font-weight="bold" fill="#7e22ce">Phase 4: SMT Backend</text>
  <text x="680" y="885" font-size="14" font-style="italic" fill="#6b21a8" text-anchor="end">Mathematical Solvers</text>
  <line x1="120" y1="900" x2="680" y2="900" stroke="#e9d5ff" stroke-width="2" />

  <rect x="180" y="920" width="200" height="60" rx="6" fill="#ffffff" stroke="#d8b4fe" stroke-width="1" />
  <text x="280" y="945" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">toolOracles.py</text>
  <text x="280" y="965" font-size="12" fill="#475569" text-anchor="middle">Macro Engine (AST Substitutor)</text>

  <rect x="420" y="920" width="200" height="60" rx="6" fill="#ffffff" stroke="#d8b4fe" stroke-width="1" />
  <text x="520" y="945" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">toolZ3.py</text>
  <text x="520" y="965" font-size="12" fill="#475569" text-anchor="middle">Z3 Translator &amp; Loop Verifier</text>

  <line x1="400" y1="1010" x2="400" y2="1050" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />

  <rect x="250" y="1060" width="140" height="40" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="2" />
  <text x="320" y="1086" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">✅ PROVED</text>

  <rect x="410" y="1060" width="140" height="40" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
  <text x="480" y="1086" font-size="16" font-weight="bold" fill="#b91c1c" text-anchor="middle">❌ INVALID</text>
</svg>
